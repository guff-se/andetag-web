      en: "Gallery with the ANDETAG info panel on the wall and visitors viewing symmetrical textile works."
      de: "Galerie mit dem ANDETAG-Infoschild an der Wand und Besuchenden vor symmetrischen Textilwerken."
    tags: [gallery, textile-art, sculpture, visitors, info-panel, wayfinding]

  - file: gallery-visitor-on-bench-contemplation.jpg
    original: _94A4151-mid.jpg
    alt:
      sv: "Besökare sitter ensam på en bänk och betraktar en symmetrisk textilskulptur på väggen."
      en: "A lone visitor sits on a bench, contemplating a symmetrical textile sculpture on the wall."
