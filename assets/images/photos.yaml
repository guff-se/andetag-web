# Photo catalog for the ANDETAG image library.
#
# Contents described by image recognition. Alt text follows the Andetag tone:
# calm, concrete, sensory. See docs/Tone of Voice.md and docs/alt-text-review.md.
#
# Fields
#   file      : current filename on disk (after renaming)
#   original  : source filename received from the photographer export
#   alt       : localized alt text (sv = primary, en, de)
#   tags      : free-form descriptors for search and grouping
#
# Locations are not asserted unless visible in the frame (e.g. the "ANDETAG
# - Malin & Gustaf Tadaa" signage in the entrance photo).
#
# Artworks
#   Photos named "Andetag N-*" in the source export depict artwork number N
#   in the Andetag series (e.g. "Andetag 13-35.jpg" = artwork Andetag no. 13,
#   internal sequence 35). After renaming, the artwork number is preserved in
#   the slug as "artwork-andetag-N-..." and called out in the alt text.

photos:
