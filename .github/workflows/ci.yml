name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  site-build-and-test:
    name: Astro site build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
